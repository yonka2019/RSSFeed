name: Build Docker on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docker image and export to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: rssfeed:${{ steps.tag.outputs.tag }}
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.tag }}
          outputs: type=docker,dest=/tmp/rssfeed-${{ steps.tag.outputs.tag }}.tar

      - name: Create GitHub Release with image
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/rssfeed-${{ steps.tag.outputs.tag }}.tar
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

      - name: Upload Docker image to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          FILE="/tmp/rssfeed-${TAG}.tar"
          test -f "$FILE" || { echo "::error::missing $FILE"; ls -lah /tmp; exit 1; }

          aws s3 cp "$FILE" \
            "s3://y.packages/rssfeed/rssfeed-${TAG}.tar" \
            --metadata "tag=${TAG},commit=${GITHUB_SHA}" \
            --checksum-algorithm CRC32 \
            --no-progress
